<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Loading Engine...</title>
        <script type="text/javascript">
            // Segment the current URL structure
            var l = window.location;

            // Redirect back to the main index.html file while storing the intended path in a query string.
            // This preserves your clean URL strings downstream!
            l.replace(
                l.protocol +
                    "//" +
                    l.hostname +
                    (l.port ? ":" + l.port : "") +
                    l.pathname.split("/").slice(0, 1).join("/") +
                    "/?p=" +
                    l.pathname.slice(1).replace(/&/g, "~and~") +
                    (l.search
                        ? "&q=" + l.search.slice(1).replace(/&/g, "~and~")
                        : "") +
                    l.hash,
            );
        </script>
    </head>
    <body></body>
</html>
